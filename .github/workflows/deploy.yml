name: Deploy to lv-claude

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OFFICE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519_office_deploy
          chmod 600 ~/.ssh/id_ed25519_office_deploy

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 155.212.225.69 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/id_ed25519_office_deploy -o StrictHostKeyChecking=yes skunokil@155.212.225.69 \
            'cd ~/projects/office && git pull && echo "Deployed at $(date)"'
